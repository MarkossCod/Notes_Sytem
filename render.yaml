# Servico web construido a partir do Dockerfile do repositorio.
services:
  - type: web
    name: notessytem
    env: docker
    plan: free
    # Valores publicos; segredos de aplicacao e banco devem ser definidos no painel.
    envVars:
      - key: APP_NAME
        value: NOTESSYTEM
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: mysql